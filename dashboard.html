<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard MAXCELL</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{
background:linear-gradient(135deg,#0f0f12,#1a1a22);
color:#fff;
padding:30px;
min-height:100vh;
}

h1{
color:#ff4d00;
margin-bottom:20px;
}

.section{
background:#18181f;
padding:20px;
border-radius:15px;
margin-bottom:30px;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
}

button{
background:#ff4d00;
color:#fff;
cursor:pointer;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:15px;
}

.card{
background:#1f1f28;
padding:15px;
border-radius:10px;
}

.remove{
background:#ff0000;
margin-top:8px;
}
</style>
</head>
<body>

<h1>Dashboard MAXCELL</h1>

<!-- PRODUTOS -->
<div class="section">
<h3>Adicionar Produto</h3>

<input type="text" id="nome" placeholder="Nome do Produto">
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="estoque" placeholder="Quantidade em Estoque">

<select id="categoria">
<option value="iphone">iPhone</option>
<option value="samsung">Samsung</option>
<option value="xiaomi">Xiaomi</option>
<option value="acessorios">Acessórios</option>
<option value="outros">Outros</option>
</select>

<label>
<input type="checkbox" id="destaque"> Produto em Destaque
</label>

<input type="file" id="imagem">

<button onclick="addProduto()">Salvar Produto</button>

<h3 style="margin-top:20px">Produtos Cadastrados</h3>
<div class="grid" id="listaProdutos"></div>
</div>

<!-- ASSISTÊNCIA -->
<div class="section">
<h3>Adicionar Tipo de Assistência</h3>

<input type="text" id="nomeAssistencia" placeholder="Ex: Troca de Tela iPhone">
<button onclick="addAssistencia()">Adicionar Serviço</button>

<h3 style="margin-top:20px">Serviços Cadastrados</h3>
<div class="grid" id="listaAssistencia"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAKw1YsAEFxcaW9dSi7RNH85vy2oTfNmco",
authDomain:"maxcell-22faf.firebaseapp.com",
projectId:"maxcell-22faf"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const IMGBB_API_KEY="00b8ccb9e5395d31baef065f27516c2b";

/* ---------------- PRODUTOS ---------------- */

window.addProduto=async function(){

const file=document.getElementById("imagem").files[0];
if(!file){alert("Selecione uma imagem");return;}

const formData=new FormData();
formData.append("image",file);

const response=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{
method:"POST",
body:formData
});

const data=await response.json();
const imageUrl=data.data.url;

await addDoc(collection(db,"maxcell_produtos"),{
nome:nome.value,
preco:preco.value,
estoque:parseInt(estoque.value),
categoria:categoria.value,
destaque:destaque.checked,
imagem:imageUrl,
cliques:0
});

alert("Produto adicionado com sucesso");

nome.value="";
preco.value="";
estoque.value="";
imagem.value="";
}

onSnapshot(collection(db,"maxcell_produtos"),snap=>{
listaProdutos.innerHTML="";
snap.forEach(d=>{
const p=d.data();
listaProdutos.innerHTML+=`
<div class="card">
<strong>${p.nome}</strong><br>
Preço: R$ ${p.preco}<br>
Estoque: ${p.estoque}<br>
Categoria: ${p.categoria}<br>
Cliques: ${p.cliques||0}
<button class="remove" onclick="removerProduto('${d.id}')">Remover</button>
</div>
`;
});
});

window.removerProduto=async function(id){
await deleteDoc(doc(db,"maxcell_produtos",id));
}

/* ---------------- ASSISTÊNCIA ---------------- */

window.addAssistencia=async function(){
if(!nomeAssistencia.value){return;}

await addDoc(collection(db,"maxcell_orcamentos"),{
nome:nomeAssistencia.value
});

nomeAssistencia.value="";
}

onSnapshot(collection(db,"maxcell_orcamentos"),snap=>{
listaAssistencia.innerHTML="";
snap.forEach(d=>{
const s=d.data();
listaAssistencia.innerHTML+=`
<div class="card">
${s.nome}
<button class="remove" onclick="removerAssistencia('${d.id}')">Remover</button>
</div>
`;
});
});

window.removerAssistencia=async function(id){
await deleteDoc(doc(db,"maxcell_orcamentos",id));
}
</script>

</body>
</html>
